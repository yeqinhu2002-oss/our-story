<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我们的90天轨道</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #fdf6f6 0%, #f5e6e8 100%);
            color: #4a4a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        /* 浪漫全屏背景爱心飘落特效 */
        body::before {
            content: "♥";
            position: absolute;
            color: rgba(217, 106, 106, 0.15);
            font-size: 24px;
            animation: heartDrop 8s linear infinite;
            text-shadow: 100px 200px cubic-bezier(0.4, 0, 0.2, 1), 300px 500px ease-in, 500px 100px ease-out;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes heartDrop {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* 全屏容器 */
        .container {
            width: 100vw;
            max-width: 800px;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            z-index: 1;
        }
        /* 沉浸式信笺幕布 */
        .curtain {
            position: absolute;
            width: 100%;
            height: 95vh;
            padding: 35px 25px;
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .curtain.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            z-index: 10;
            pointer-events: auto;
        }
        /* 文字区域控制 - 完美对齐与大字体行距 */
        .text-section {
            max-width: 650px;
            margin: 0 auto;
            text-align: center;
        }
        .date-tag {
            font-size: 1.1rem; /* 放大日期标签 */
            color: #d96a6a;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }
        h2 {
            font-size: 1.9rem; /* 大幅放大每一幕主标题 */
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
            position: relative;
            display: inline-block;
            letter-spacing: 1px;
        }
        h2::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 20%;
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d96a6a, transparent);
        }
        p {
            font-size: 1.2rem; /* 大幅放大正文字体，更清晰好读 */
            line-height: 1.9; /* 配合大字体提高行高，增强呼吸感 */
            color: #5c5c5c;
            text-align: center; 
            margin-top: 12px;
            letter-spacing: 0.5px;
        }
        
        /* 乱中有序自适应相片墙：支持横竖不同的原始图片尺寸 */
        .ordered-scat-wall {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px 30px;
            width: 100%;
            max-width: 600px;
            margin: auto;
            padding: 15px 0;
            overflow-y: auto;
            max-height: 52vh;
        }
        
        /* 拍立得相框基础样式 */
        .polaroid {
            background: #fff;
            padding: 12px 12px 25px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            flex: 1 1 40%;
            max-width: 220px; 
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 保持图片本身的原始比例与真实尺寸 */
        .polaroid img {
            max-width: 100%;
            height: auto;
            max-height: 160px; 
            border-radius: 2px;
            background: #f7f7f7;
            display: block;
        }
        
        .polaroid::after {
            content: attr(data-caption);
            display: block;
            text-align: center;
            font-size: 0.85rem;
            color: #555;
            margin-top: 10px;
            font-family: "STKaiti", "楷体", serif;
            white-space: nowrap;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* 模拟手账胶带 */
        .polaroid::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 35%;
            width: 30%;
            height: 16px;
            background-color: rgba(217, 106, 106, 0.15);
            backdrop-filter: blur(1px);
            z-index: 2;
        }

        /* 触控悬浮交互 */
        .polaroid:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 99 !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        /* 乱中有序的秩序倾斜控制 */
        .ordered-scat-wall .polaroid:nth-child(4n+1) { transform: rotate(-3deg) translateY(2px); }
        .ordered-scat-wall .polaroid:nth-child(4n+2) { transform: rotate(3deg) translateY(-4px); }
        .ordered-scat-wall .polaroid:nth-child(4n+3) { transform: rotate(2deg) translateY(3px); }
        .ordered-scat-wall .polaroid:nth-child(4n+4) { transform: rotate(-4deg) translateY(-2px); }

        /* 第三幕的第5张图（送别）单独放大居中显现 */
        #scene-3 .p5 {
            flex: 1 1 60%;
            max-width: 260px;
            transform: rotate(1deg) !important;
        }
        #scene-3 .p5 img {
            max-height: 180px;
        }

            justify-content: center;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 600px;
            margin: auto;
        }

            max-width: 280px;

            transition: all 0.4s ease;
        }
        .polaroid-large img {
            max-width: 100%;
            height: auto;
            max-height: 200px;
            display: block;
